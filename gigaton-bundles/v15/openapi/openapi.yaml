openapi: 3.1.0
info:
  title: Gigaton Payments API
  version: 1.5.0
paths:
  /api/payments/create-session:
    post:
      summary: Create normalized payment session
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Session created}
  /api/payments/create-intent:
    post:
      summary: Create normalized payment intent
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Intent created}
  /api/payments:
    get:
      summary: List recent payments
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Payments list}
  /api/payment-events:
    get:
      summary: List recent payment events
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Payment event list}
