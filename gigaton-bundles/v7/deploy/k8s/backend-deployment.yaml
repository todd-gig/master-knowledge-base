apiVersion: apps/v1
kind: Deployment
metadata:
  name: gigaton-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gigaton-backend
  template:
    metadata:
      labels:
        app: gigaton-backend
    spec:
      containers:
        - name: backend
          image: gigaton/backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_PATH
              value: "/app/data/gigaton.db"
            - name: JWT_SECRET
              value: "replace-me"
