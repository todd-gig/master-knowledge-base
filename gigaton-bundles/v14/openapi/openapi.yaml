openapi: 3.1.0
info:
  title: Gigaton Payments Real Execution API
  version: 1.4.0
paths:
  /api/payments/create-session:
    post:
      summary: Create normalized payment session
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentSessionRequest'
      responses:
        '200': {description: Session created}
  /api/payments/create-intent:
    post:
      summary: Create normalized payment intent
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '200': {description: Intent created}
  /api/payments/{payment_id}:
    get:
      summary: Get normalized payment
      parameters:
        - in: header
          name: x-tenant-id
          required: true
          schema: {type: string}
        - in: path
          name: payment_id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Payment record}
  /api/admin/tenant-payment-policy/{tenant_id}:
    get:
      summary: Get tenant provider policy
      responses:
        '200': {description: Tenant payment policy}
    put:
      summary: Update tenant provider policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': {description: Policy updated}
components:
  schemas:
    CreatePaymentSessionRequest:
      type: object
      required: [provider, amount_cents, currency, order_id, success_url, cancel_url]
      properties:
        provider: {type: string, enum: [auto, stripe, godaddy_poynt]}
        amount_cents: {type: integer, minimum: 0}
        currency: {type: string}
        order_id: {type: string}
        customer_email: {type: string}
        success_url: {type: string}
        cancel_url: {type: string}
        metadata: {type: object}
    CreatePaymentIntentRequest:
      type: object
      required: [provider, amount_cents, currency, order_id]
      properties:
        provider: {type: string, enum: [auto, stripe, godaddy_poynt]}
        amount_cents: {type: integer, minimum: 0}
        currency: {type: string}
        order_id: {type: string}
        capture_mode: {type: string, enum: [automatic, manual]}
        metadata: {type: object}
