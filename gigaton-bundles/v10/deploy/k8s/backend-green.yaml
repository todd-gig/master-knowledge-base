apiVersion: apps/v1
kind: Deployment
metadata: {name: gigaton-backend-green}
spec:
  replicas: 1
  selector: {matchLabels: {app: gigaton-backend, color: green}}
  template:
    metadata: {labels: {app: gigaton-backend, color: green}}
    spec:
      containers:
        - name: backend
          image: gigaton/backend:green
          ports: [{containerPort: 3001}]
          livenessProbe: {httpGet: {path: /api/health, port: 3001}}
          readinessProbe: {httpGet: {path: /api/ready, port: 3001}}
