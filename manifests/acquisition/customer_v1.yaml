# Gigaton Customer Acquisition Onboarding — Manifest v1.0.0
#
# This manifest is the SOURCE OF TRUTH for the CUSTOMER acquisition path —
# the end-buyer of an operator's product/service (e.g. a Carmen Beach
# Properties guest, a Multipli vendor's downstream buyer). It is declarative
# data; no business logic lives here.
#
# Provenance / doctrine refs (see references[] block at bottom):
#   - [[universal_acquisition_framework_2026_05_26]]          (parent spec)
#   - [[onboarding_v1]]                                       (CLIENT manifest — shape template)
#   - [[foundational_goal_gigaton_engineered_brand_experience]] (PPIM)
#   - [[universal_connector_hub_architecture]]                 (substrate)
#
# UAF stage mapping (parent spec §2.1 → this manifest):
#   UAF Stage 1 Awareness        → stage-0-awareness-capture
#   UAF Stage 2 Identification   → stage-1-identity-resolve
#   UAF Stage 3 Qualification    → stage-2-needs-qualified
#   UAF Stage 4 Engagement       → stage-3-offer-presented
#   UAF Stage 5 Onboarding       → stage-4-checkout, stage-5-access-provisioned
#   UAF Stage 6 Activation       → stage-6-product-walkthrough, stage-7-first-value
#   UAF Stage 7 Compounding      → stage-8-compounding
#
# UX model — chat-first by default, but customers may also progress entirely
# without auth via the operator's front-of-house UI (auto-generated by the
# UI Auto-Gen Renderer, UAF §3.5). Stage advancement is driven by signals
# captured against the customer's IDP profile.

version: 1.0.0
manifest_id: gigaton-customer-acquisition-onboarding
acquisition_category: customer
introduced_at: '2026-05-28T00:00:00Z'
canonical_source: master-knowledge-base/manifests/acquisition/customer_v1.yaml
parent_framework: universal_acquisition_framework_2026_05_26
ratified_by:
  - todd@gigaton.ai
  - matt@gigaton.ai
  - bella@gigaton.ai

# Capability tiers — what the customer can do / see at each maturity step.
# Tiers layer ON TOP of operator-defined entitlements. The actor here is the
# CUSTOMER (not the operator).
capability_tiers:
  tier_1_browse:
    unlocked_by_stages: [stage-0-awareness-capture]
    grants:
      - customer.catalog.browse
      - customer.offer.read_public
  tier_2_qualified:
    unlocked_by_stages: [stage-1-identity-resolve, stage-2-needs-qualified]
    grants:
      - customer.offer.read_personalized
      - customer.intelligence.chat
  tier_3_purchased:
    unlocked_by_stages: [stage-3-offer-presented, stage-4-checkout]
    grants:
      - customer.account.access
      - customer.support.priority
  tier_4_activated:
    unlocked_by_stages: [stage-5-access-provisioned, stage-6-product-walkthrough, stage-7-first-value]
    grants:
      - customer.product.full_use
      - customer.feedback.write
  tier_5_compounding:
    unlocked_by_stages: [stage-8-compounding]
    grants:
      - customer.referral.issue
      - customer.loyalty.compound

# Customer-facing nav surfaces (the operator's storefront, not the
# Gigaton operator console). Auto-rendered by UI Auto-Gen Renderer.
nav_circles:
  - circle_id: storefront
    label: Browse
    route: '{operator_storefront}/'
    tier_required: always
    icon: home
  - circle_id: offer
    label: Your Match
    route: '{operator_storefront}/offer'
    tier_required: tier_2_qualified
    icon: target
  - circle_id: checkout
    label: Checkout
    route: '{operator_storefront}/checkout'
    tier_required: tier_2_qualified
    icon: shopping-cart
  - circle_id: account
    label: Account
    route: '{operator_storefront}/account'
    tier_required: tier_3_purchased
    icon: user
  - circle_id: support
    label: Support
    route: '{operator_storefront}/support'
    tier_required: tier_3_purchased
    icon: help-circle
  - circle_id: refer
    label: Refer
    route: '{operator_storefront}/refer'
    tier_required: tier_5_compounding
    icon: share

deprecated_routes: []

# ─────────────────────────────────────────────────────────────────────────
# STAGES — Each stage is bound to ONE owning engine. The activation_gate is
# a query that engine answers (200 OK + JSON predicate → stage advances).
# ─────────────────────────────────────────────────────────────────────────

stages:

  # ─── STAGE 0 — AWARENESS ───────────────────────────────────────────────
  - id: stage-0-awareness-capture
    order: 0
    name: Awareness Captured
    short_description: First observable signal (page view, ad click, referral landing, doc fetch) is captured against a pre-IDP cookie/anon id.
    why_this_stage: |
      UAF Stage 1. The customer has not identified themselves. The platform
      records the touch as a SignalEvent so it can be reconciled to an IDP
      profile the moment identity resolves. Without this stage, all later
      attribution is broken.
    primary_actor: customer
    owning_engine: user-access-engine
    secondary_engines: [intelligence-silo, gigaton-gateway]
    ui_route: '{operator_storefront}/'
    entry_signal:
      type: always_open
    activation_gate:
      method: GET
      url: '{uae_base}/v1/idp/signals?session_id={session_id}'
      predicate:
        json_path: '$.signal_count'
        operator: gte
        value: 1
      ttl_seconds: 30
    exit_criterion:
      event_type: SignalCaptured
      description: gigaton-gateway/v1/acquisition/signal received ≥1 valid SignalEvent for this anon session
    signoff_required: false
    actions:
      - id: capture-anon-signal
        title: Capture first touch (transparent to customer)
        description: First-party JS pixel + server-side fallback emit SignalEvent on page view, ad-utm landing, referral click, or content fetch.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/'
        auto_complete_on:
          - event_type: SignalCaptured
    education:
      why_1min: '/docs/acquisition/customer/why/awareness-1min.md'
    events_emitted:
      - SignalCaptured
      - StageCompleted
    capability_unlocks_on_completion: tier_1_browse
    gamification:
      badge_slug: customer-discovered-us
      badge_name: You Found Us
      streak_eligible: false
      fallback_predicted_influence_usd: 35
    ppim_signature:
      interaction: attribution chain seeded
      economics: avg $35 of marketing spend retired against this touch
      predictability: HIGH
      brand_dimension: discoverability

  # ─── STAGE 1 — IDENTIFICATION ──────────────────────────────────────────
  - id: stage-1-identity-resolve
    order: 1
    name: Identity Resolved
    short_description: Customer self-identifies (email capture, social login, checkout intent) and the IDP resolution worker creates/merges the IDP profile.
    why_this_stage: |
      UAF Stage 2. Until identity resolves, the platform cannot personalize,
      cannot match offers, and cannot retain. The shared IDPProfile schema
      (see uaf_phase_a_shared_schemas) is the canonical record.
    primary_actor: customer
    owning_engine: user-access-engine
    secondary_engines: [intelligence-silo]
    ui_route: '{operator_storefront}/'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-0-awareness-capture
    activation_gate:
      method: GET
      url: '{uae_base}/v1/idp/profile?session_id={session_id}'
      predicate:
        all_of:
          - json_path: '$.idp_profile_id'
            operator: is_not_null
          - json_path: '$.primary_identity'
            operator: is_not_null
      ttl_seconds: 30
    exit_criterion:
      event_type: IDPProfileResolved
      description: idp_profiles row created or matched with non-null primary_identity (email, phone, or social-graph id)
    signoff_required: false
    actions:
      - id: prompt-email-capture
        title: Soft email capture
        description: Inline email field on the offer/checkout surface; customer may also auth via Google/Apple/phone.
        action_label: Continue
        action_href: '{operator_storefront}/identify'
        auto_complete_on:
          - event_type: IDPIdentitySubmitted
      - id: merge-anon-signals
        title: Reconcile prior anon signals to this IDP profile
        description: Resolution worker walks back the session_id chain and re-stamps SignalEvents with the new idp_profile_id.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/'
        auto_complete_on:
          - event_type: IDPProfileResolved
    education:
      why_1min: '/docs/acquisition/customer/why/identity-1min.md'
    events_emitted:
      - IDPIdentitySubmitted
      - IDPProfileResolved
      - StageCompleted
    capability_unlocks_on_completion: tier_2_qualified
    gamification:
      badge_slug: customer-identified
      badge_name: Identified
      streak_eligible: false
      fallback_predicted_influence_usd: 120
    ppim_signature:
      interaction: identity → all later personalization possible
      economics: avg $120 LTV uplift from personalized vs anonymous funnel
      predictability: HIGH
      brand_dimension: trust + recognition

  # ─── STAGE 2 — QUALIFICATION ───────────────────────────────────────────
  - id: stage-2-needs-qualified
    order: 2
    name: Needs Qualified
    short_description: 10 Intelligence Dimensions + ethnographic frames score the IDP; needs inferred; offer set ranked.
    why_this_stage: |
      UAF Stage 3. The platform must move beyond "captured email" to
      "understands what this customer is here for". needs_inference.py runs
      against the IDPProfile to produce a NeedsProfile; offer_matcher.py
      ranks offers using the operator's promotion-priority config.
    primary_actor: customer
    owning_engine: intelligence-silo
    secondary_engines: [user-access-engine, decision-engine]
    ui_route: '{operator_storefront}/offer'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-1-identity-resolve
    activation_gate:
      method: GET
      url: '{intel_silo_base}/v1/needs-profile?idp_profile_id={idp_profile_id}'
      predicate:
        all_of:
          - json_path: '$.needs_profile_id'
            operator: is_not_null
          - json_path: '$.confidence'
            operator: gte
            value: 0.4
      ttl_seconds: 60
    exit_criterion:
      event_type: NeedsProfileScored
      description: needs_inference job emits NeedsProfileScored with confidence ≥ 0.4 (or operator-overridden floor)
    signoff_required: false
    actions:
      - id: run-needs-inference
        title: Run needs inference
        description: Background job — uses 10 Intelligence Dimensions, ethnographic frames, Variable Registry, and any volunteered context.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/offer'
        auto_complete_on:
          - event_type: NeedsProfileScored
      - id: rank-offers
        title: Rank offers against need
        description: offer_matcher.py scores operator's offer catalog; biased by promotion-priority config.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/offer'
        auto_complete_on:
          - event_type: OfferSetRanked
    education:
      why_1min: '/docs/acquisition/customer/why/qualification-1min.md'
    events_emitted:
      - NeedsProfileScored
      - OfferSetRanked
      - StageCompleted
    capability_unlocks_on_completion: tier_2_qualified
    gamification:
      badge_slug: customer-understood
      badge_name: Understood
      streak_eligible: false
      fallback_predicted_influence_usd: 280
    ppim_signature:
      interaction: every later surface is now needs-targeted
      economics: avg 2-4x conversion lift on personalized offer surfaces
      predictability: MEDIUM (depends on signal density)
      brand_dimension: relevance

  # ─── STAGE 3 — ENGAGEMENT ──────────────────────────────────────────────
  - id: stage-3-offer-presented
    order: 3
    name: Offer Presented
    short_description: UI Auto-Gen Renderer composes a personalized offer page; Ti Agent Matrix dispatches an Intelligence Layer conversation if customer engages chat.
    why_this_stage: |
      UAF Stage 4. The customer sees the matched superpower/service/offer
      in their language, in their preferred surface (page, chat, email).
      Engagement = clicked CTA, opened chat, or scheduled a call.
    primary_actor: customer
    owning_engine: gigaton-ui-system
    secondary_engines: [intelligence-silo, decision-engine]
    ui_route: '{operator_storefront}/offer'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-2-needs-qualified
    activation_gate:
      method: GET
      url: '{uae_base}/v1/idp/engagement?idp_profile_id={idp_profile_id}'
      predicate:
        json_path: '$.engagement_events'
        operator: gte
        value: 1
      ttl_seconds: 60
    exit_criterion:
      event_type: OfferEngaged
      description: customer clicked CTA, opened chat thread, or scheduled call within rendered offer surface
    signoff_required: false
    actions:
      - id: render-auto-ui
        title: Render auto-generated offer surface
        description: autoUiComposer.ts assembles components from gigaton-ui-system/components/auto/* based on NeedsProfile.
        action_label: View offer
        action_href: '{operator_storefront}/offer'
        auto_complete_on:
          - event_type: OfferSurfaceRendered
      - id: engage-cta
        title: Customer engages CTA / chat / schedule
        description: Click on rendered CTA, opens chat, or books a call. Any one advances the stage.
        action_label: Continue
        action_href: '{operator_storefront}/offer'
        auto_complete_on:
          - event_type: OfferEngaged
    education:
      why_1min: '/docs/acquisition/customer/why/engagement-1min.md'
    events_emitted:
      - OfferSurfaceRendered
      - OfferEngaged
      - StageCompleted
    capability_unlocks_on_completion: tier_3_purchased
    gamification:
      badge_slug: customer-engaged
      badge_name: Engaged
      streak_eligible: false
      fallback_predicted_influence_usd: 450
    ppim_signature:
      interaction: customer has now consented to dialog
      economics: avg 3-6x conversion vs cold visit
      predictability: HIGH
      brand_dimension: voice + experience coherence

  # ─── STAGE 4 — CHECKOUT (ONBOARDING I) ─────────────────────────────────
  - id: stage-4-checkout
    order: 4
    name: Checkout
    short_description: Customer completes payment / commitment. Stripe (or operator-configured payment provider) confirms the transaction.
    why_this_stage: |
      UAF Stage 5a. First half of customer onboarding. Without a confirmed
      transaction (paid or contract-signed), the platform has not crossed
      the revenue threshold and downstream activation events are unsafe to
      fire. Min payout per [[payout_1_min_threshold_1k_2026_05_26]] applies
      to operator payouts, not to customer transactions.
    primary_actor: customer
    owning_engine: gigaton-gateway
    secondary_engines: [intelligence-silo, user-access-engine]
    ui_route: '{operator_storefront}/checkout'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-3-offer-presented
    activation_gate:
      method: GET
      url: '{gateway_base}/v1/transactions?idp_profile_id={idp_profile_id}&status=succeeded'
      predicate:
        json_path: '$.transaction_count'
        operator: gte
        value: 1
      ttl_seconds: 30
    exit_criterion:
      event_type: TransactionConfirmed
      description: payment/contract confirmed webhook received from operator's configured payment connector (stripe / paypal / square / contract-signed)
    signoff_required: true
    signoff:
      type: payment_confirmation
      actor: payment_provider_webhook
      stored_in: gateway_transactions_table
    actions:
      - id: present-payment-form
        title: Present payment / commitment form
        description: Auto-Gen Renderer adapts to operator's configured payment connector (Stripe Checkout, PayPal, Square, contract-sign).
        action_label: Pay / Sign
        action_href: '{operator_storefront}/checkout'
        auto_complete_on:
          - event_type: PaymentFormSubmitted
      - id: confirm-transaction
        title: Confirm transaction via provider webhook
        description: Provider webhook posts to gigaton-gateway; gateway validates signature and records to transactions table.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/checkout/confirmed'
        auto_complete_on:
          - event_type: TransactionConfirmed
    education:
      why_1min: '/docs/acquisition/customer/why/checkout-1min.md'
    events_emitted:
      - PaymentFormSubmitted
      - TransactionConfirmed
      - StageCompleted
    capability_unlocks_on_completion: tier_3_purchased
    gamification:
      badge_slug: customer-committed
      badge_name: Committed
      streak_eligible: false
      success_celebration: 'Thanks for choosing us. Setting up your access now.'
      fallback_predicted_influence_usd: 1200
    ppim_signature:
      interaction: economic commitment confirmed
      economics: revenue event recorded; PPIM scoreboard updates
      predictability: HIGH
      brand_dimension: trust + reliability

  # ─── STAGE 5 — ACCESS PROVISIONED (ONBOARDING II) ──────────────────────
  - id: stage-5-access-provisioned
    order: 5
    name: Access Provisioned
    short_description: Customer account credentials, entitlements, and personalized environment are provisioned.
    why_this_stage: |
      UAF Stage 5b. Second half of customer onboarding. Account exists in
      UAE; entitlements written; welcome surface generated; access to
      operator product unlocked. Without this stage, the customer has paid
      but cannot use what they paid for.
    primary_actor: operator
    owning_engine: user-access-engine
    secondary_engines: [gigaton-gateway, intelligence-silo]
    ui_route: '{operator_storefront}/account'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-4-checkout
    activation_gate:
      method: GET
      url: '{uae_base}/v1/customer-accounts/{idp_profile_id}/entitlements'
      predicate:
        all_of:
          - json_path: '$.account_created_at'
            operator: is_not_null
          - json_path: '$.entitlement_count'
            operator: gte
            value: 1
      ttl_seconds: 60
    exit_criterion:
      event_type: CustomerAccessProvisioned
      description: UAE customer_accounts row created + entitlements bound + welcome surface rendered
    signoff_required: false
    actions:
      - id: create-customer-account
        title: Create customer account
        description: UAE writes customer_accounts row scoped to operator namespace; auth credentials issued.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/account'
        auto_complete_on:
          - event_type: CustomerAccountCreated
      - id: bind-entitlements
        title: Bind entitlements to account
        description: Mapped from purchased SKU(s) — features, quotas, support tier.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/account'
        auto_complete_on:
          - event_type: EntitlementsBound
      - id: send-welcome
        title: Send welcome (email + in-app)
        description: Templated from operator brand voice (per operator's onboarding_v1 Stage 3 brand_voice variables); deep-link to product walkthrough.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/account'
        auto_complete_on:
          - event_type: WelcomeDispatched
    education:
      why_1min: '/docs/acquisition/customer/why/access-1min.md'
    events_emitted:
      - CustomerAccountCreated
      - EntitlementsBound
      - WelcomeDispatched
      - CustomerAccessProvisioned
      - StageCompleted
    capability_unlocks_on_completion: tier_4_activated
    gamification:
      badge_slug: customer-welcomed
      badge_name: Welcomed
      streak_eligible: false
      fallback_predicted_influence_usd: 90
    ppim_signature:
      interaction: customer now has the keys to the product
      economics: prevents day-1 churn from broken access
      predictability: HIGH
      brand_dimension: reliability + responsiveness

  # ─── STAGE 6 — PRODUCT WALKTHROUGH (ACTIVATION I) ──────────────────────
  - id: stage-6-product-walkthrough
    order: 6
    name: Product Walkthrough
    short_description: Customer is guided through the product surfaces relevant to their stated need.
    why_this_stage: |
      UAF Stage 6a. The walkthrough is the bridge from "has access" to
      "extracts value". It is NeedsProfile-driven — the customer sees the
      capabilities matched to what they're here for, not a generic tour.
    primary_actor: customer
    owning_engine: gigaton-ui-system
    secondary_engines: [intelligence-silo]
    ui_route: '{operator_storefront}/account/start'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-5-access-provisioned
    activation_gate:
      method: GET
      url: '{uae_base}/v1/customer-accounts/{idp_profile_id}/walkthrough-state'
      predicate:
        json_path: '$.steps_completed_pct'
        operator: gte
        value: 70
      ttl_seconds: 60
    exit_criterion:
      event_type: WalkthroughCompleted
      description: customer completed ≥ 70% of NeedsProfile-personalized walkthrough steps (operator may override floor)
    signoff_required: false
    actions:
      - id: start-walkthrough
        title: Start guided walkthrough
        description: Steps rendered by autoUiComposer.ts using customer's NeedsProfile.
        action_label: Start tour
        action_href: '{operator_storefront}/account/start'
        auto_complete_on:
          - event_type: WalkthroughStarted
      - id: complete-walkthrough-steps
        title: Complete walkthrough steps
        description: Each step emits WalkthroughStepCompleted; the resolver tracks against the personalized step plan.
        action_label: Continue
        action_href: '{operator_storefront}/account/start'
        auto_complete_on:
          - event_type: WalkthroughCompleted
    education:
      why_1min: '/docs/acquisition/customer/why/walkthrough-1min.md'
    events_emitted:
      - WalkthroughStarted
      - WalkthroughStepCompleted
      - WalkthroughCompleted
      - StageCompleted
    capability_unlocks_on_completion: tier_4_activated
    gamification:
      badge_slug: customer-onboarded
      badge_name: Onboarded
      streak_eligible: true
      fallback_predicted_influence_usd: 180
    ppim_signature:
      interaction: customer knows where the value lives
      economics: avg 40-60% reduction in week-2 churn
      predictability: MEDIUM
      brand_dimension: clarity + competence

  # ─── STAGE 7 — FIRST VALUE (ACTIVATION II) ─────────────────────────────
  - id: stage-7-first-value
    order: 7
    name: First Value Delivered
    short_description: Customer trips the operator-defined first-value metric (per-operator config; Penrose scoreboard receives the ActivationEvent).
    why_this_stage: |
      UAF Stage 6b. This is the activation moment — the customer has
      experienced the promised value. Definitions live in
      decision-engine/config/activation_metrics.yaml under
      `category: customer`. Examples: first stay completed, first transaction
      shipped, first AI conversation that produced a deliverable.
    primary_actor: customer
    owning_engine: decision-engine
    secondary_engines: [intelligence-silo, gigaton-gateway]
    ui_route: '{operator_storefront}/account'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-6-product-walkthrough
    activation_gate:
      method: GET
      url: '{decision_engine_base}/v1/activation/events?idp_profile_id={idp_profile_id}&category=customer&first=true'
      predicate:
        json_path: '$.activation_event_count'
        operator: gte
        value: 1
      ttl_seconds: 60
    exit_criterion:
      event_type: ActivationEventRecorded
      description: decision-engine writes ActivationEvent with category=customer and first_for_idp_profile=true
    signoff_required: false
    actions:
      - id: observe-first-value-metric
        title: Observe first-value metric trip
        description: Operator-defined per activation_metrics.yaml; recorded against Penrose 8-metric scoreboard.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/account'
        auto_complete_on:
          - event_type: ActivationEventRecorded
    education:
      why_1min: '/docs/acquisition/customer/why/first-value-1min.md'
    events_emitted:
      - ActivationEventRecorded
      - StageCompleted
    capability_unlocks_on_completion: tier_4_activated
    gamification:
      badge_slug: customer-activated
      badge_name: Activated
      streak_eligible: false
      success_celebration: 'You got value. We are now compounding from here.'
      fallback_predicted_influence_usd: 650
    ppim_signature:
      interaction: customer is in the value loop
      economics: foundational for LTV — every later interaction compounds
      predictability: HIGH
      brand_dimension: outcomes + delivery

  # ─── STAGE 8 — COMPOUNDING ─────────────────────────────────────────────
  - id: stage-8-compounding
    order: 8
    name: Compounding
    short_description: Repeat purchase, retention, referral issuance, and HR-signal utilization tracking compound the relationship.
    why_this_stage: |
      UAF Stage 7. The customer is no longer being acquired; they are being
      retained and amplified. compounding_per_profile.sql view aggregates
      repeat-purchase frequency, referral conversion, and satisfaction
      signals. HME utilization sweep triggers if compounding stalls.
    primary_actor: customer
    owning_engine: human-management-engine
    secondary_engines: [decision-engine, intelligence-silo]
    ui_route: '{operator_storefront}/account'
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-7-first-value
    activation_gate:
      method: GET
      url: '{hme_base}/v1/compounding/per-profile?idp_profile_id={idp_profile_id}'
      predicate:
        any_of:
          - json_path: '$.repeat_purchase_count'
            operator: gte
            value: 1
          - json_path: '$.referral_attributed_count'
            operator: gte
            value: 1
          - json_path: '$.satisfaction_signal'
            operator: gte
            value: 0.7
      ttl_seconds: 300
    exit_criterion:
      event_type: CompoundingObserved
      description: any one of repeat purchase / attributed referral / satisfaction ≥ 0.7 observed in 90d window
    signoff_required: false
    actions:
      - id: enable-referral
        title: Enable referral path
        description: Customer becomes eligible to issue referral tracking links (delegates into affiliate manifest if customer opts in).
        action_label: Refer a friend
        action_href: '{operator_storefront}/refer'
        auto_complete_on:
          - event_type: ReferralLinkIssued
      - id: track-repeat
        title: Track repeat purchase
        description: gateway transaction stream attributes repeat against IDP profile.
        action_label: '(automatic)'
        action_href: '{operator_storefront}/account'
        auto_complete_on:
          - event_type: RepeatPurchaseObserved
    education:
      why_1min: '/docs/acquisition/customer/why/compounding-1min.md'
    events_emitted:
      - ReferralLinkIssued
      - RepeatPurchaseObserved
      - SatisfactionSignalRecorded
      - CompoundingObserved
      - StageCompleted
    capability_unlocks_on_completion: tier_5_compounding
    gamification:
      badge_slug: customer-compounding
      badge_name: Compounding
      streak_eligible: true
      fallback_predicted_influence_usd: 2400
    ppim_signature:
      interaction: customer is now a multiplier (LTV + referral)
      economics: full PPIM customer loop closed
      predictability: continuously falsified by Penrose
      brand_dimension: full coherence

# ─────────────────────────────────────────────────────────────────────────
# CHAT ORCHESTRATION CONTRACT (inherits from onboarding_v1 — only overrides)
# ─────────────────────────────────────────────────────────────────────────
chat_orchestration:
  inherits_from: master-knowledge-base/manifests/onboarding_v1.yaml#/chat_orchestration
  default_intent_derivation:
    question_template: '{action.title}'
    context_template: '{action.description}'
    button_label: '{action.action_label}'
    fallback_route: '{action.action_href}'
    success_template: '{action.verify_description}'
    activation_event: '{action.auto_complete_on[0].event_type}'
  affordance_resolution:
    inline_form:
      trigger_events:
        - IDPIdentitySubmitted
        - PaymentFormSubmitted
      ux: 'Inline form embedded in chat — submit returns to conversation'
    oauth_kickoff:
      trigger_events:
        - IDPIdentitySubmitted  # when social login chosen
      ux: 'Single button in chat that opens OAuth window'
    confirmation_only:
      trigger_events:
        - TransactionConfirmed
        - CustomerAccessProvisioned
        - WalkthroughCompleted
        - ActivationEventRecorded
        - CompoundingObserved
      ux: 'Acknowledge button in chat'
  per_stage_overrides:
    stage-0-awareness-capture:
      opening_message: null  # silent; customer is not in chat yet
    stage-3-offer-presented:
      opening_message: |
        Welcome. Based on what brought you here, I think this is what
        you're after — does this match what you had in mind?
    stage-6-product-walkthrough:
      opening_message: |
        You're in. Let me show you the parts of the product that are
        relevant to what you told me you're trying to do.

# ─────────────────────────────────────────────────────────────────────────
# OVERLAY SCHEMA (per-operator customizations of this customer manifest)
# ─────────────────────────────────────────────────────────────────────────
overlay_schema:
  description: |
    Each operator can override this customer manifest via
    UAE.client_namespaces.workflow_overlays.customer_acquisition. The resolver
    merges the overlay with the canonical manifest at request time.
  shape:
    hide:
      description: Stage IDs to omit (e.g. operator with no checkout flow may hide stage-4-checkout if they use trial-only).
      type: array
      items: string
      restricted_by_axiom: AX-???
    reorder:
      type: array
      items: string
    replace:
      type: object
      additional_properties:
        type: object
    extend:
      type: array
      items:
        $ref: '#/stages/0'
    inviolable_stage_ids:
      type: array
      const:
        - stage-1-identity-resolve
        - stage-4-checkout
        - stage-7-first-value

# ─────────────────────────────────────────────────────────────────────────
# GATEWAY ENDPOINTS — re-use the manifest/state/intent triad from
# onboarding_v1, distinguished by `?category=customer` query param.
# ─────────────────────────────────────────────────────────────────────────
gateway_endpoints:
  manifest:
    endpoint: GET /v1/acquisition/manifest
    query_params:
      category: customer
      operator_id: required
      idp_profile_id: optional
      include_overlay: default=true
    headers:
      X-Client-Namespace: required
    response:
      schema_ref: '#/stages'
      cache_control: 'max-age=60, private'
      etag: required
  state:
    endpoint: GET /v1/acquisition/state
    query_params:
      category: customer
      idp_profile_id: required
    response:
      shape:
        current_stage_id: string
        stages_completed: array of stage_id
        current_tier_unlocked: enum [tier_1_browse, tier_2_qualified, tier_3_purchased, tier_4_activated, tier_5_compounding]
        nav_circles_enabled: array of circle_id
        predicted_ltv_usd: number
    cache_control: 'max-age=10, private'
  intent:
    endpoint: POST /v1/acquisition/intent
    purpose: |
      Customer chat reply / button click / form submission goes here. Gateway
      routes through LLM router for intent extraction, dispatches the HME
      event to the owning engine. Same shape as onboarding_v1 intent endpoint.

