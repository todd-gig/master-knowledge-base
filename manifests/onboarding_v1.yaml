      fallback_predicted_influence_usd: 85000
    ppim_signature:
      interaction: platform now produces decisions on your behalf
      economics: full PPIM loop closed — operator is in compounding regime
      predictability: continuously falsified by Penrose scoreboard
      brand_dimension: full coherence + autonomy

  # ─── STAGE 10 — LOCAL MIND (added v1.2.0) ───────────────────────────────
  # Differs from stages 0-9: this stage is NOT linearly sequenced after
  # stage-9-calibration-live; it has 4 INDEPENDENT sub-paths (one per
  # local-mind tier) that operator can pursue in any order once they've
  # installed gigaton-local-mind (Phase 1). Entry signal = always_open
  # because local-mind progression is orthogonal to the onboarding tier
  # ladder. The 4 actions below map 1:1 to the 4 local-mind nav circles.
  #
  # Operators reach this stage by clicking a dim local-mind circle on
  # the /platform hub. The chat orchestrator switches to local-mind mode
  # via query-param `?tier=N` and walks the operator through that tier's
  # action set ONLY.
  - id: stage-10-local-mind
    order: 10
    name: Local Mind — Operator-Machine Capability Ladder
    short_description: Install gigaton-local-mind on your machine, then progressively unlock embed → search → transcribe → generate locally — driving Vertex cost toward zero for routine work.
    why_this_stage: |
      Vertex AI is the frontier-reasoning + IAM + sovereignty wrapper, not
      the cost-reduction lever. The cost lever is the LOCAL half of the
      routing doctrine — bounded repeatable abilities run on your machine
      (embed, dedup, redact, search, classify, transcribe, first-pass
      generate). This stage walks you through installing gigaton-local-mind
      and authorizing each capability tier. See
      [[directive_local_mind_buildout_2026_06_01]] for the 3-phase build
      schedule (Ph1 EOD 6/03, Ph2 EOD 6/12, Ph3 EOD 6/26).
    owning_engine: gigaton-gateway  # handshake endpoint owner
    secondary_engines: [intelligence-silo]  # ingest_preembedded + search escalation
    entry_signal:
      type: always_open  # orthogonal to stage progression — operator can pursue any time
    activation_gate:
      # Stage completion = all 4 tiers unlocked. Sub-tier unlock = individual circle bright.
      # The activation gate uses the gateway local-mind state aggregator.
      method: GET
      url: '{gateway_base}/v1/local-mind/state?operator_id={operator_id}'
      predicate:
        json_path: '$.tiers_unlocked_count'
        operator: gte
        value: 4
      ttl_seconds: 30
    actions:
      - id: install-local-mind
        title: Install gigaton-local-mind on your machine
        description: |
          Download + run the gigaton-local-mind installer (Inno Setup .exe
          on Windows / .pkg on macOS / .sh on Linux). Once installed, the
          local MCP server registers with the gateway via the handshake
          endpoint. Tier 1 (Reading Eyes) unlocks immediately on successful
          handshake. Persistence lands at ~/.gigaton/local-mind/<operator_id>/.
        action_label: Install local mind
        action_href: '/chat?onboarding=stage-10-local-mind&tier=1'
        unlocks_local_mind_tier: tier_1_reading_eyes
        education_ref: '/docs/local-mind/install-walkthrough'
        verify_description: |
          Gateway has received a POST /v1/local-mind/handshake with
          installed=true and phase_1_active=true for this operator.
        auto_complete_on:
          - event_type: LocalMindInstalled
          - event_type: LocalMindHandshakeRegistered
      - id: enable-local-search
        title: Enable local FAISS search + classifier
        description: |
          Activate Phase 2 capabilities. /v1/qa/ask first-pass routes to
          your local index; local classifier handles routine categorization.
          Requires Phase 2 of the local-mind MCP installed (auto-updates if
          you opted into the update channel).
        action_label: Enable local search
        action_href: '/chat?onboarding=stage-10-local-mind&tier=2'
        unlocks_local_mind_tier: tier_2_local_mind
        education_ref: '/docs/local-mind/local-search'
        auto_complete_on:
          - event_type: LocalMindPhase2Activated
      - id: authorize-microphone
        title: Authorize microphone for local transcription
        description: |
          Grant microphone access so transcription (mlx-whisper /
          whisper.cpp) can run on your machine. Meeting audio never leaves
          your computer.
        action_label: Authorize mic
        action_href: '/chat?onboarding=stage-10-local-mind&tier=3'
        unlocks_local_mind_tier: tier_3_connected_tools
        education_ref: '/docs/local-mind/transcription'
        verify_description: |
          Local MCP reports mic_authorized=true on the next handshake heartbeat.
        auto_complete_on:
          - event_type: LocalMindMicAuthorized
      - id: pass-capability-probe
        title: Run capability probe + enable local SLM
        description: |
          Local SLM (Llama-3.2-3B Q4_K_M ~2GB by default) generates
          first-pass drafts on your machine. Requires RAM ≥16GB AND ≥10GB
          free disk. The probe runs automatically on Phase 3 install; if
          your machine doesn't qualify, the platform stays cloud-only for
          generation but Tiers 1-3 keep working.
        action_label: Run capability probe
        action_href: '/chat?onboarding=stage-10-local-mind&tier=4'
        unlocks_local_mind_tier: tier_4_writing_hand
        education_ref: '/docs/local-mind/capability-probe'
        verify_description: |
          Local MCP reports capability_probe_passed=true.
        auto_complete_on:
          - event_type: LocalMindCapabilityProbePassed
    education:
      why_1min: '/docs/why/local-mind-1min.md'
      what_3min: '/docs/what/local-mind-3min.md'
      deep_dive_10min: '/docs/deep/local-mind-routing-doctrine-10min.md'
    events_emitted:
      - StageStarted
      - LocalMindInstalled
      - LocalMindHandshakeRegistered
      - LocalMindPhase2Activated
      - LocalMindMicAuthorized
      - LocalMindCapabilityProbePassed
      - LocalMindTierUnlocked  # generic — fired with tier_id payload
      - StageCompleted
    # NOTE: stage-10 does NOT grant a capability_tier from the platform
    # ladder. Local-mind tiers are orthogonal — see local_mind_tiers block.
    capability_unlocks_on_completion: null
    grants_local_mind_tier_on_completion: tier_4_writing_hand  # final tier
    gamification:
      badge_slug: local-mind-fully-installed
      badge_name: Local Mind — Fully Installed
      streak_eligible: true  # daily local-mind uptime streak
      per_tier_badges:
        tier_1_reading_eyes: { badge_slug: local-mind-reading-eyes, badge_name: Reading Eyes }
        tier_2_local_mind: { badge_slug: local-mind-local-mind, badge_name: Local Mind }
        tier_3_connected_tools: { badge_slug: local-mind-connected-tools, badge_name: Connected Tools }
        tier_4_writing_hand: { badge_slug: local-mind-writing-hand, badge_name: Writing Hand }
      fallback_predicted_influence_usd: 12000  # est. annual Vertex offload per operator
    ppim_signature:
      interaction: every routine embed/search/classify/transcribe runs at $0 marginal
      economics: est. Vertex bill reduction 40-70% for steady-state operators
      predictability: HIGH — capability-tier-gated, telemetry-tuned escalation thresholds
      brand_dimension: sovereignty + cost integrity + sub-100ms loop

# ─────────────────────────────────────────────────────────────────────────
# CHAT ORCHESTRATION CONTRACT
# How ChatOnboardingOrchestrator derives chat affordances from this manifest.
# No per-action chat_intent needed by default — derived from existing fields.
# ─────────────────────────────────────────────────────────────────────────
chat_orchestration:
  default_intent_derivation:
    question_template: '{action.title}'
    context_template: '{action.description}'
    button_label: '{action.action_label}'
    fallback_route: '{action.action_href}'
    success_template: '{action.verify_description}'
    activation_event: '{action.auto_complete_on[0].event_type}'
  affordance_resolution:
    # The orchestrator picks an affordance type per action based on the
    # event_type the activation gate is waiting on. This is auto-derived
    # — no per-action override needed unless behavior differs.
    file_drop:
      trigger_events:
        - DocumentationAccountsLinked
        - DocumentationFolderSubscribed
      ux: 'Drag-and-drop zone embedded in the chat bubble'
    inline_form:
      trigger_events:
        - ScopeIdentityDeclared
        - ScopeJurisdictionsSelected
        - NorthStarDeclared
        - SupportingMetricAdded
        - ConstraintRegistered
        - VariableInstanceFilled
        - ICPSegmentDeclared
        - CustomerLifecycleDefined
        - ToolInventoried
      ux: 'Inline form embedded in chat — submit returns to conversation'
    multiple_choice:
      trigger_events:
        - AxiomAcknowledged
        - PersonaClassified
        - IndustrySelected
        - IndustryProcessTriaged
        - AutomationCandidateScored
      ux: 'Button group embedded in chat bubble — one or multiple choice'
    proposed_review_cards:
      trigger_events:
        - PersonaCreated
        - InitiativeIdentified
      ux: 'Carousel of cards in chat — each card has Accept/Edit/Reject'
    free_text:
      trigger_events:
        - PersonaIntentCaptured
        - ScopeContractSigned
      ux: 'Conversational free-text input'
    oauth_kickoff:
      trigger_events:
        - BillingConnectorEstablished
      ux: 'Single button in chat that opens OAuth window'
    credential_paste:
      trigger_events:
        - ProviderCredentialRegistered
      ux: |
        Per-provider masked paste field embedded in chat — value is captured
        client-side, sent via TLS to gigaton-gateway /v1/connectors/credentials
        with the operator's session JWT, validated against the provider's API,
        then stored in per-operator Secret Manager. The masked input is never
        echoed back, never logged in the transcript, never sent to LLM router.
        For OAuth providers, the affordance falls back to oauth_kickoff. For
        iCal URLs (OTAs), affordance is plain URL paste (no masking needed).
        Orchestrator iterates connector_catalog rows where credential_required=true
        AND operator inventoried the tool in `inventory-tools` action.
    confirmation_only:
      trigger_events:
        - UnitEconomicsReviewed
        - ShadowReviewCompleted
        - LiveRecommendActivated
        - LiveAutoExecuteActivated
        - EscalationPathDefined
        - InitiativeOwnerAssigned
      ux: 'Acknowledge button in chat — typically after operator reviews a panel'
    shadow_mode_toggle:
      trigger_events:
        - ShadowModeEnabled
      ux: 'Toggle switch in chat with explanation copy'
  per_stage_overrides:
    # If a stage needs custom chat behavior, override here. Empty by default
    # — the derivation above covers all 10 stages.
    stage-0-trust-scope:
      opening_message: |
        Welcome to Gigaton. I'm going to walk you through 10 stages of setup
        — but mostly you'll just talk to me here. Let's start with who you
        are and what rules your operator agrees to operate under.
    stage-1-sources:
      opening_message: |
        Now let's connect your documentation. The fastest path: connect
        Google Drive, and I'll ingest what's there. You can also drag-drop
        files directly into this chat.
    stage-2-people:
      opening_message: |
        I've scanned your sources and pulled out the people who appear most
        often. Let's confirm who they are and what they do for your operator.
    stage-9-calibration-live:
      opening_message: |
        Last stage. We're going to run me in shadow mode for 30 days while
        you keep doing things your way — then graduate me to live decisions
        once drift is clean and you're comfortable.

# ─────────────────────────────────────────────────────────────────────────
# OVERLAY SCHEMA (for client_namespaces.workflow_overlays JSONB)
# ─────────────────────────────────────────────────────────────────────────
overlay_schema:
  description: |
    Each operator can override this manifest via UAE.client_namespaces.workflow_overlays.
    The resolver in gigaton-gateway merges the overlay with the canonical
    manifest at request time. Overlay operations are restricted by axioms
    to prevent operators from bypassing CRIT-severity stages.
  shape:
    hide:
      description: Stage IDs to omit from this operator's workflow.
      type: array
      items: string
      restricted_by_axiom: AX-???  # define an axiom that prevents hiding stages tagged inviolable
    reorder:
      description: New order for stage IDs (must be a permutation of remaining stages).
      type: array
      items: string
    replace:
      description: Per-stage replacement of specific fields (e.g. swap actions[].action_href for a custom UI).
      type: object
      additional_properties:
        type: object
    extend:
      description: Operator-specific extra stages appended after canonical stages.
      type: array
      items:
        $ref: '#/stages/0'  # same shape as a canonical stage
    inviolable_stage_ids:
      description: Stages that must always be present regardless of overlay (server-enforced).
      type: array
      const: [stage-0-trust-scope, stage-9-calibration-live]

# ─────────────────────────────────────────────────────────────────────────
# GATEWAY ENDPOINTS — three new endpoints land in gigaton-gateway
# ─────────────────────────────────────────────────────────────────────────
gateway_endpoints:
  manifest:
    endpoint: GET /v1/onboarding/manifest
    query_params:
      operator_id: required
      include_overlay: default=true
    headers:
      X-Client-Namespace: required
    response:
      schema_ref: '#/stages'  # the merged + resolved manifest
      cache_control: 'max-age=60, private'
      etag: required
    binding_engines_resolved:
      uae_base: from gateway routing_table
      intel_silo_base: from gateway routing_table
      persona_base: from gateway routing_table
      decision_engine_base: from gateway routing_table
      ppeme_base: from gateway routing_table
      hme_base: from gateway routing_table

  state:
    endpoint: GET /v1/onboarding/state
    query_params:
      operator_id: required
    response:
      shape:
        current_stage_id: string
        stages_completed: array of stage_id
        current_stage_actions_completed: array of action_id
        current_tier_unlocked: enum [tier_1_data, tier_2_personalized, tier_3_recommend, tier_4_costs, tier_5_live]
        nav_circles_enabled: array of circle_id
        # ADDED v1.2.0 — local-mind tier state, surfaced alongside platform tier state.
        # Empty array when operator hasn't installed gigaton-local-mind.
        local_mind_tiers_unlocked: array of tier_id  # subset of local_mind_tiers keys
        local_mind_installed: boolean
        local_mind_handshake_last_seen_at: timestamp | null
        predicted_influence_to_date_usd: number
        predicted_influence_at_completion_usd: number
    cache_control: 'max-age=10, private'
    computed_by: 'gateway polls each stage activation_gate + reads latest local-mind handshake state; aggregates'

  # ADDED v1.2.0 — local-mind handshake. Owned by gigaton-gateway.
  local_mind_handshake:
    endpoint: POST /v1/local-mind/handshake
    purpose: |
      Operator's local gigaton-local-mind MCP server posts heartbeat /
      registration here. Gateway records install state, phase activation,
      mic_authorized, capability_probe_passed, then re-computes
      local_mind_tiers_unlocked and updates /v1/onboarding/state.
    request_body:
      operator_id: string (required)
      installed: boolean
      phase_1_active: boolean
      phase_2_active: boolean
      phase_3_active: boolean
      mic_authorized: boolean
      capability_probe_passed: boolean
      capability_probe_details:
        ram_gb: number
        disk_free_gb: number
        cpu_arch: string
        gpu_present: boolean
      mcp_server_address: string  # default 127.0.0.1:7180 per [[gignet_local_node_doctrine]]
      mtls_cert_fingerprint: string
    response:
      shape:
        tiers_unlocked: array of tier_id
        routing_hints:
          embed: enum [local, cloud]
          search: enum [local, cloud]
          transcribe: enum [local, cloud]
          generate: enum [local, frontier]
        next_unlock_action_id: string | null  # action_id from stage-10
    side_effects:
      - emits LocalMindHandshakeRegistered event
      - if newly-unlocked tier: emits LocalMindTierUnlocked + flips local_mind nav circles bright

  # ADDED v1.2.0 — local-mind state aggregator (read-side mirror of handshake).
  local_mind_state:
    endpoint: GET /v1/local-mind/state
    query_params:
      operator_id: required
    response:
      shape:
        installed: boolean
        tiers_unlocked: array of tier_id
        tiers_unlocked_count: integer
        last_handshake_at: timestamp | null
        cost_saved_to_date_usd: number  # Vertex bill avoided via local routing
        per_tier_status:
          tier_1_reading_eyes: enum [locked, unlocked, degraded]
          tier_2_local_mind: enum [locked, unlocked, degraded]
          tier_3_connected_tools: enum [locked, unlocked, degraded]
          tier_4_writing_hand: enum [locked, unlocked, degraded, not_eligible]
    cache_control: 'max-age=30, private'

  intent:
    endpoint: POST /v1/onboarding/intent
    purpose: |
      ChatOnboardingOrchestrator posts the operator's chat reply (text +
      optional attachments + clicked affordance metadata) here. Gateway
      routes through LLM router (app/llm_router) for intent extraction,
      then dispatches the resulting HME event to the owning engine.
    request_body:
      operator_id: string (required)
      stage_id: string (current stage from /v1/onboarding/state)
      action_id: string (which action this reply addresses)
      reply_kind: enum [text, button_click, file_drop, form_submission, oauth_complete]
      payload:
        text: string (when reply_kind=text)
        button_value: string (when reply_kind=button_click)
        file_ids: array (when reply_kind=file_drop — references intel-silo upload IDs)
        form_data: object (when reply_kind=form_submission)
        oauth_state: object (when reply_kind=oauth_complete)
    response:
      event_emitted: string (HME event_type that fired)
      activation_gate_status: enum [unchanged, advanced, completed_stage]
      next_action: object | null (the next chat affordance to render)
      side_panel_update: object (refreshed stage progress + tier state)
    side_effects:
      - emits HME event matching auto_complete_on
      - re-evaluates activation_gate for the affected stage
      - if stage completes, advances current_stage_id and emits StageCompleted
    safety:
      - LLM router uses a constrained intent-extraction prompt (no free generation)
      - extracted intent validated against the manifest's expected event_type whitelist
      - rejection mode: orchestrator surfaces 'I didn't quite catch that — could you click one of the options?'

