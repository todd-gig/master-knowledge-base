# ─────────────────────────────────────────────────────────────────────────
# SCHEMA NOTES — v1.2.0 ADDITIVE EXTENSIONS (do not break v1.1.0 readers)
# ─────────────────────────────────────────────────────────────────────────
#
# v1.2.0 (2026-06-02) adds the LOCAL-MIND CAPABILITY LADDER. Every
# extension below is additive — v1.1.0-compatible readers (current gateway
# resolver + FE useNavCircleGating hook + ChatOnboardingOrchestrator) keep
# working without code changes; new fields are read-when-present.
#
# 1. TOP-LEVEL NEW BLOCK: `local_mind_tiers`
#    Parallel to `capability_tiers`. 5 tier definitions
#    (tier_0_unprovisioned through tier_4_writing_hand) each with
#    handshake_state predicate + grants + capability_required.
#
# 2. NEW OPTIONAL FIELDS on `nav_circles[]` entries:
#      - local_mind_tier_required: string | null
#          When set, circle is bright IFF tier_id ∈ local_mind_tiers_unlocked.
#          Existing entries omit this field → behavior unchanged.
#      - capability_required: array of capability strings (informational —
#          FE can render "requires: embed, dedup" tooltip on dim circles).
#      - parent_circle: string  (default "platform" — used by hub layout).
#      - orbit: enum [inner, middle, outer, local_mind]
#          Concentric-orbit hint per [[platform_hub_circles_design_directive]].
#          Existing entries default to tier-based orbit; local_mind orbit
#          is NEW and renders as a separate concentric ring.
#      - navigates_to_on_locked: string
#          Click-when-dim destination URL. If absent, FE falls back to the
#          existing rule from the directive memo (`/chat?onboarding=stage-N`
#          where N is the last entry in capability_tiers[tier_required]
#          .unlocked_by_stages[]).
#      - description: string (long-form, surfaced in hover tooltip).
#
# 3. NEW OPTIONAL FIELDS on `stages[]` entries (used only by stage-10):
#      - grants_local_mind_tier_on_completion: tier_id
#      - actions[].unlocks_local_mind_tier: tier_id
#      - gamification.per_tier_badges: object
#
# 4. NEW GATEWAY ENDPOINTS (additive — existing 3 endpoints unchanged):
#      - POST /v1/local-mind/handshake
#      - GET  /v1/local-mind/state
#      - GET /v1/onboarding/state response gains 3 new fields:
#          local_mind_tiers_unlocked, local_mind_installed,
#          local_mind_handshake_last_seen_at
#
# 5. NEW STAGE: `stage-10-local-mind` with order:10.
#    entry_signal.type=always_open (orthogonal to stage 0-9 linear progression).
#    Convention preserved: stages numbered sequentially by `order:`; new
#    stages append after the highest existing order. Future additions
#    should continue this pattern (stage-11, stage-12, ...).
#
# 6. FE INTEGRATION CONTRACT for useNavCircleGating (downstream — gigaton-ui-system):
#      circle.isBright =
#        (tier_required === 'always' OR nav_circles_enabled.includes(circle.circle_id))
#        AND (local_mind_tier_required == null
#             OR local_mind_tiers_unlocked.includes(local_mind_tier_required))
#        AND (additional_gate satisfied — existing rule)
#      circle.onClick (when dim) = navigates_to_on_locked
#        (FALLBACK to existing `/chat?onboarding=stage-N` derivation
#        if navigates_to_on_locked is absent).
#
# 7. CIRCLE-NAMING CONVENTION:
#      local_mind_* circles use hyphenated `circle_id`:
#        `local-mind-reading-eyes`, `local-mind-local-mind`,
#        `local-mind-connected-tools`, `local-mind-writing-hand`.
#      Future per-vertical or per-operator capability circles SHOULD
#      follow the `<namespace>-<capability>` pattern to avoid collision
#      with platform-tier circle names (which are bare nouns: chat,
#      sources, dashboard, etc.).
#
# 8. ICON PLACEHOLDERS — `local-mind-tier-N` icon strings are placeholders
#    per [[icon_generation_system_directive]]. FE falls back to a
#    lucide-react icon (suggestion: `cpu` / `database` / `mic` / `pen-tool`)
#    until the brand icon generator runs for the operator.
#
# Downstream wiring (NOT part of this PR — sequenced after merge):
#   - gigaton-gateway: implement POST /v1/local-mind/handshake + GET
#     /v1/local-mind/state + extend GET /v1/onboarding/state response.
#   - gigaton-ui-system: extend useNavCircleGating per §6 above; add
#     `<LocalMindOrbit>` ring to PlatformPage; render 4 new circles.
#   - intelligence-silo: already supports /v1/qa/ingest_preembedded
#     per [[directive_local_mind_buildout_2026_06_01]] Phase 1.
#   - cowork hub page: surface local-mind tier state + cost-saved counter
#     per Phase 2 routing-transparency requirement.

schema_notes:
  version: 1.2.0
  additive_extensions:
    - top_level: local_mind_tiers
    - nav_circles_optional_fields:
        - local_mind_tier_required
        - capability_required
        - parent_circle
        - orbit
        - navigates_to_on_locked
