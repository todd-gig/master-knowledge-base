  # ─── STAGE 4 ────────────────────────────────────────────────────────────
  - id: stage-4-goals-kpis
    order: 4
    name: Goals, KPIs & Constraints
    short_description: Set your north star, supporting KPIs, and inviolable constraints. Without these, the decision engine has no target.
    why_this_stage: |
      Penrose Falsification Scoreboard needs operator-declared targets to
      score against. Constraints (legal / contractual / ethical) become
      hard guardrails the Decision Execution Engine enforces.
    owning_engine: decision-engine
    secondary_engines: [persona-engine]
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-3-brand-customer-lens
    activation_gate:
      method: GET
      url: '{decision_engine_base}/v1/operators/{operator_id}/targets-readiness'
      predicate:
        all_of:
          - json_path: '$.north_star_defined'
            operator: eq
            value: true
          - json_path: '$.supporting_metrics_count'
            operator: gte
            value: 3
          - json_path: '$.constraints_count'
            operator: gte
            value: 1
      ttl_seconds: 60
    actions:
      - id: declare-north-star
        title: Declare your north star metric
        description: One metric that, if it goes up, your operator wins. Revenue, retention, NPS — your call.
        action_label: Declare north star
        action_href: '/onboarding/goals?action=north-star'
        auto_complete_on:
          - event_type: NorthStarDeclared
      - id: pick-supporting-metrics
        title: Pick 3+ supporting metrics
        description: Counterweights against gaming the north star. Penrose tracks all of them.
        action_label: Pick metrics
        action_href: '/onboarding/goals?action=supporting-metrics'
        auto_complete_on:
          - event_type: SupportingMetricAdded
            min_count: 3
      - id: register-constraints
        title: Register hard constraints
