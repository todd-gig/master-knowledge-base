  # ─── STAGE 8 ────────────────────────────────────────────────────────────
  - id: stage-8-tech-stack-costs
    order: 8
    name: Tech Stack + Unit Economics + Financial Audit
    short_description: Inventory every 3rd-party tool, connect billing, and ingest 90 days of invoices. Influence vs Cost dashboard turns on.
    why_this_stage: |
      PPIM = "predictably PROFITABLE" — and profitability requires knowing
      what every atomic action actually costs. This stage backfills unit
      economics across all prior stages.
    owning_engine: intelligence-silo
    secondary_engines: [gigaton-gateway]
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-7-assignments
    activation_gate:
      method: GET
      url: '{intel_silo_base}/v1/operators/{operator_id}/cost-coverage'
      predicate:
        all_of:
          - json_path: '$.tools_with_unit_cost_pct'
            operator: gte
            value: 80
          - json_path: '$.invoice_days_ingested'
            operator: gte
            value: 90
      ttl_seconds: 300
    actions:
      - id: inventory-tools
        title: Inventory every 3rd-party tool
        description: Stripe, Twilio, Anthropic, Google, OTAs, Slack — everything you pay for. Catalog seed pre-fills common tools.
        action_label: Inventory tools
        action_href: '/onboarding/tech-stack?action=inventory'
        auto_complete_on:
          - event_type: ToolInventoried
            min_count: 5
      - id: connect-billing
        title: Connect billing
        description: Stripe / banking / accounting. Read-only invoice ingest, no write access requested.
        action_label: Connect billing
        action_href: '/onboarding/tech-stack?action=connect-billing'
        auto_complete_on:
          - event_type: BillingConnectorEstablished
            min_count: 1
      - id: register-provider-credentials
        title: Register API keys, secrets, and tokens for every inventoried tool
        description: |
          For each tool you inventoried (LLM providers, comms, payments, productivity,
          OTAs, analytics, etc.), I'll walk you through providing the credential
          inline in chat. Each credential is validated against the provider's API
          before storage; nothing lands in Secret Manager until the probe succeeds.
          Credentials never appear in chat transcripts — the paste affordance is
          masked end-to-end. Per-operator namespaces; no cross-operator visibility.
        action_label: Register credentials
        action_href: '/onboarding/tech-stack?action=credentials'
        credential_classes:
          # The exhaustive set of credential types the orchestrator can prompt for.
          # The actual prompts are driven by connector_catalog rows; this list
          # documents the universe of credentials the platform knows how to ingest.
          # Per-class: how the orchestrator collects it + which probe validates it.
          llm_provider:
            providers: [openai, anthropic_direct, gemini_direct, vertex_ai_iam]
            collection: api_key_paste_or_iam_attestation
            probe: '{provider}_smoke_completion_call'
            note: 'Vertex AI Claude+Gemini use IAM (no key); only OpenAI + direct-API Anthropic/Gemini need keys'
          payments:
            providers: [stripe, paypal, square, quickbooks]
            collection: oauth_flow_or_api_key_paste
            probe: '{provider}_list_balances_or_test_charge'
          communications:
            providers: [twilio, sendgrid, mailchimp, slack, mailgun, postmark]
            collection: api_key_paste_or_oauth
            probe: '{provider}_account_describe'
          productivity:
            providers: [notion, clickup, asana, linear, monday, airtable]
            collection: api_key_paste_or_oauth
            probe: '{provider}_workspace_describe'
          source_code:
            providers: [github_pat, gitlab_token, bitbucket_app_password]
            collection: api_key_paste
            probe: '{provider}_list_repos_first_page'
            note: 'GitHub PAT used for webhook config + repo ingest; minimal scopes required'
          ota_booking:
            providers: [airbnb_ical, vrbo_ical, booking_com_ical, hospitable, hostaway]
            collection: ical_url_paste_or_api_key
            probe: '{provider}_list_reservations_last_30d'
          analytics:
            providers: [ga4_service_account, hubspot_api_key, mixpanel_service, segment_write_key]
            collection: service_account_json_upload_or_api_key
            probe: '{provider}_account_summary'
          calendar_email:
            providers: [gmail_oauth, google_calendar_oauth, outlook_oauth, icloud_app_password]
            collection: oauth_flow
            probe: '{provider}_list_first_page'
          storage:
            providers: [google_drive_oauth, dropbox_oauth, onedrive_oauth, s3_iam_key]
            collection: oauth_flow_or_iam_key_paste
            probe: '{provider}_list_root'
            note: 'Google Drive collected separately in Stage 1; other storage providers prompted here'
          ai_image_video:
            providers: [openai_dalle, gemini_omni, runway, elevenlabs, vapi]
            collection: api_key_paste
            probe: '{provider}_minimal_render_test'
          custom:
            description: 'For any provider not in the canonical list, operator declares: provider_name + credential_type + secret_value. Probe is generic "store + retrieve roundtrip".'
            collection: custom_provider_paste_form
        storage_target: 'per-operator Secret Manager — name pattern: <operator_id>--<provider>--<purpose>:latest'
        auto_complete_on:
          - event_type: ProviderCredentialRegistered
            min_count_predicate: all_credentialed_inventoried_tools
        verify_description: |
          For each inventoried tool that requires a credential, a ProviderCredentialRegistered
          event has fired with status=validated. Tools that don't need credentials
          (e.g. open APIs) or that the operator explicitly skipped (with reason) do
          not block stage completion.
        education_ref: '/docs/onboarding/credentials-walkthrough'
      - id: review-unit-economics
        title: Review computed unit economics
        description: Cost-per-atomic-action across all prior stages. Adjust where Gigaton's auto-categorization missed.
        action_label: Review unit economics
        action_href: '/onboarding/tech-stack?action=unit-economics'
        auto_complete_on:
          - event_type: UnitEconomicsReviewed
    education:
      why_1min: '/docs/why/tech-stack-costs-1min.md'
      what_3min: '/docs/what/tech-stack-costs-3min.md'
      deep_dive_10min: '/docs/deep/influence-vs-cost-10min.md'
    events_emitted:
      - StageStarted
      - ToolInventoried
      - BillingConnectorEstablished
      - ProviderCredentialRegistered
      - UnitEconomicsReviewed
      - StageCompleted
    capability_unlocks_on_completion: tier_4_costs
    gamification:
      badge_slug: economics-illuminated
      badge_name: Economics Illuminated
      streak_eligible: false
      fallback_predicted_influence_usd: 38000
    ppim_signature:
      interaction: Influence vs Cost dashboard turns on
      economics: every later optimization graded by actual $ delta
      predictability: HIGH
      brand_dimension: financial integrity + transparency

  # ─── STAGE 9 ────────────────────────────────────────────────────────────
  - id: stage-9-calibration-live
