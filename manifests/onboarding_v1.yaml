        action_href: '/onboarding/goals?action=constraints'
        auto_complete_on:
          - event_type: ConstraintRegistered
            min_count: 1
    education:
      why_1min: '/docs/why/goals-1min.md'
      what_3min: '/docs/what/goals-3min.md'
      deep_dive_10min: '/docs/deep/penrose-falsification-10min.md'
    events_emitted:
      - StageStarted
      - NorthStarDeclared
      - SupportingMetricAdded
      - ConstraintRegistered
      - StageCompleted
    capability_unlocks_on_completion: tier_3_recommend
    gamification:
      badge_slug: goal-set
      badge_name: Goal Set
      streak_eligible: false
      fallback_predicted_influence_usd: 22000
    ppim_signature:
      interaction: all later recommendations now graded against your targets
      economics: prevents misaligned automation (avg $30k+/yr risk avoided)
      predictability: HIGH
      brand_dimension: coherence + accountability

