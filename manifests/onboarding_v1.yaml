# Gigaton Operator Onboarding — Canonical Manifest v1.2.0
#
# This manifest is the SOURCE OF TRUTH for the directed onboarding workflow.
# It is declarative data. No business logic lives here. Logic lives in:
#   - Activation-gate endpoints (owned by each binding engine)
#   - The generic resolver (gigaton-gateway/app/onboarding/resolver.py)
#   - The generic FE chat-orchestrator (gigaton-ui-system ChatOnboardingOrchestrator)
#
# UX MODEL — chat-first orchestration:
#   New operators land on /chat as the ONLY enabled nav circle. The
#   ChatOnboardingOrchestrator reads this manifest, picks the next open
#   action(s), and renders them as rich chat messages with affordances
#   (file-drop, inline buttons, persona-extraction cards, ICP segment
#   builder, etc.). Operator replies — typed or button-clicked — are
#   routed through gateway /v1/onboarding/intent → mapped to HME events
#   → activation gates flip. Side-panel reflects stage progress, tier
#   progress, and predicted influence $.
#
#   Per-action `chat_intent` is the primary affordance. `action_href` is a
#   FALLBACK for accessibility / direct-link bookmarks, not the canonical
#   surface.
#
#   /wizard is DEPRECATED — redirects to /chat?onboarding=stage-0.
#
# Per-operator divergence happens via UAE.client_namespaces.workflow_overlays
# JSONB — { hide: [], reorder: [], replace: {}, extend: [] }. The resolver
# merges this manifest with the overlay at request time.
#
# PPIM signature applies to the manifest itself:
#   ppim_interaction: every operator's first ~30 days on the platform
#   ppim_economics:   est. $5-15k saved per onboarding via self-serve vs hand-held
#   ppim_predictability: HIGH — completion of all stages = operator is in live mode
#   ppim_brand_dimension: adoption + comprehension + activation
#
# Why a manifest (not embedded state-machine logic):
#   - Per-operator override is free (workflow_overlays JSONB)
#   - AI-editable diffs go through Axiom Registry safety checks
#   - Same manifest drives FE banner/modal, CLI walkthrough, email drip,
#     Slack DM sequence, Sunday digest "next step" section
#   - Versioned audit artifact ("operator X completed manifest v1.0.0")
#   - Aligns with decision-engine's declarative DecisionRecord pattern

version: 1.2.0
manifest_id: gigaton-operator-onboarding
introduced_at: '2026-05-22T19:00:00Z'  # Friday 19:00 CT target
canonical_source: master-knowledge-base/manifests/onboarding_v1.yaml
ratified_by:
  - todd@gigaton.ai     # assumed within triad signoff window 2026-05-14 → 2026-05-24
  - matt@gigaton.ai
  - bella@gigaton.ai

# Capability tiers unlocked by stage completion.
# Tier values are role-orthogonal — they layer ON TOP of UAE.capabilities_catalog
# role_required (OWNER / AFFILIATE / OPERATOR). An operator must have BOTH the
# role-required AND the tier unlocked to use the capability.
capability_tiers:
  tier_1_data:
    unlocked_by_stages: [stage-0-trust-scope, stage-1-sources]
    grants:
      - gigaton.chat.with_documents
      - gigaton.documentation.view_bundle
  tier_2_personalized:
    unlocked_by_stages: [stage-2-people, stage-3-brand-customer-lens]
    grants:
      - gigaton.communication.personalized_compose
      - gigaton.persona.read_bft_snapshot
  tier_3_recommend:
    unlocked_by_stages: [stage-4-goals-kpis, stage-5-industry-processes, stage-6-org-processes]
    grants:
      - gigaton.decision.draft_recommendations_read_only
  tier_4_costs:
    unlocked_by_stages: [stage-7-assignments, stage-8-tech-stack-costs]
    grants:
      - gigaton.dashboard.influence_vs_cost
  tier_5_live:
    unlocked_by_stages: [stage-9-calibration-live]
    grants:
      - gigaton.decision.live_recommend
      - gigaton.decision.live_auto_execute

# ─────────────────────────────────────────────────────────────────────────
# LOCAL-MIND CAPABILITY LADDER (added v1.2.0)
#
# Orthogonal to capability_tiers above. capability_tiers are onboarding-stage
# completion gates that turn on Gigaton platform features. local_mind_tiers
# are LOCAL-NODE-installed-capability gates that turn on offload-to-operator-
# machine features (embed locally, search locally, transcribe locally,
# generate locally). An operator may sit at, say, tier_3_recommend on the
# platform side but tier_0_unprovisioned on the local-mind side until they
# install the gigaton-local-mind MCP server.
#
# Source-of-truth state lives on the operator's local machine and is reported
# UPSTREAM to gateway via the local-mind handshake:
#   POST /v1/local-mind/handshake (gateway, per directive_local_mind_buildout_2026_06_01)
# The handshake response telegraphs which local-mind tier the operator's
# machine qualifies for (capability probe — RAM, disk, mic-authorized, etc.).
# Gateway then includes the unlocked tier set in:
#   GET /v1/onboarding/state.local_mind_tiers_unlocked: array of tier_id
# The FE primitive `useNavCircleGating` reads this in addition to
# `nav_circles_enabled` and lights/dims local-mind circles accordingly.
#
# Phase mapping (per [[directive_local_mind_buildout_2026_06_01]]):
#   Phase 1 EOD 2026-06-03 → tier_1 (Reading Eyes)
#   Phase 2 EOD 2026-06-12 → tier_2 (Local Mind) + conditional tier_3 (mic-authorized)
#   Phase 3 EOD 2026-06-26 → tier_4 (Writing Hand) gated on capability probe
#
# Tier names match [[gignet_local_node_doctrine]] 4-tier model — the older
# 7-tier ladder in [[gignet_local_node_capability_ladder]] (2026-05-08) is
# superseded by the Phase 1-3 buildout directive (2026-06-01).
# ─────────────────────────────────────────────────────────────────────────
local_mind_tiers:
  tier_0_unprovisioned:
    description: |
      Operator has not installed the gigaton-local-mind MCP server. All
      embed/search/classify/transcribe/generate work routes to cloud (Vertex
      AI for frontier, intelligence-silo for FAISS). This is the default for
      every new operator.
    handshake_state:
      installed: false
    grants: []
  tier_1_reading_eyes:
    description: |
      Local mind installed + Phase 1 capabilities active. Embeds, dedup, and
      PII redaction run on operator's machine; intelligence-silo accepts
      pre-embedded chunks via /v1/qa/ingest_preembedded (cloud embedder
      bypassed). FAISS index lives at ~/.gigaton/local-mind/<operator_id>/.
    handshake_state:
      installed: true
      phase_1_active: true
    grants:
      - gigaton.local_mind.embed
      - gigaton.local_mind.dedup
      - gigaton.local_mind.redact_pii
      - gigaton.local_mind.ingest_preembedded
    capability_required: [embed, dedup, redact_pii]
  tier_2_local_mind:
    description: |
      Phase 2 search + classification active. /v1/qa/ask first-pass routes
      to the operator's local FAISS index. Local classifier handles routine
      categorization; escalates to Vertex Haiku only when confidence < 0.7.
    handshake_state:
      installed: true
      phase_2_active: true
    grants:
      - gigaton.local_mind.search
      - gigaton.local_mind.categorize_doc
      - gigaton.local_mind.classifier_head_v1
    capability_required: [search, categorize]
  tier_3_connected_tools:
    description: |
      Microphone authorized + transcription active. mlx-whisper (Apple
      Silicon) or whisper.cpp (cross-platform) runs locally; meeting audio
      never leaves the operator's machine. Connected to the operator's
      installed desktop apps surfaced via the local MCP server.
    handshake_state:
      installed: true
      phase_2_active: true
      mic_authorized: true
    grants:
      - gigaton.local_mind.transcribe_audio
      - gigaton.local_mind.desktop_tool_bridge
    capability_required: [transcribe, mic_authorized]
    additional_gate: 'operator microphone authorization'
  tier_4_writing_hand:
    description: |
      Phase 3 local SLM (Llama-3.2-3B Q4_K_M default) generates first-pass
      drafts on operator's machine. /v1/qa/ask first-pass is local; explicit
      "ask the frontier" escalates to Vertex per the routing doctrine.
      Gated on capability probe — RAM ≥16GB AND disk ≥10GB free.
    handshake_state:
      installed: true
      phase_3_active: true
      capability_probe_passed: true
    grants:
      - gigaton.local_mind.slm_first_pass
      - gigaton.local_mind.escalate_to_frontier
    capability_required: [slm_generate, capability_probe]
    additional_gate: 'capability_probe: ram_gb >= 16 AND disk_free_gb >= 10'

