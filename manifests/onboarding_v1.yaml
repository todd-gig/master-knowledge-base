      what_3min: '/docs/what/calibration-3min.md'
      deep_dive_10min: '/docs/deep/ovs-calibration-10min.md'
    events_emitted:
      - StageStarted
      - ShadowModeEnabled
      - ShadowReviewCompleted
      - LiveRecommendActivated
      - LiveAutoExecuteActivated
      - StageCompleted
