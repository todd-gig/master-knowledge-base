    label: Chat
    route: /chat
    tier_required: always
    icon: chat
  - circle_id: sources
    label: Sources
    route: /sources
    tier_required: tier_1_data
    icon: database
  - circle_id: dashboard
    label: Dashboard
    route: /dashboard
    tier_required: tier_1_data
    icon: gauge
  - circle_id: connectors
    label: Connectors
    route: /connectors
    tier_required: tier_1_data
    icon: cable
  - circle_id: people
    label: People
    route: /people
    tier_required: tier_2_personalized
    icon: users
  - circle_id: brand
    label: Brand
    route: /brand
    tier_required: tier_2_personalized
    icon: palette
  - circle_id: intelligence
    label: Intelligence
    route: /intelligence
    tier_required: tier_2_personalized
    icon: brain
  - circle_id: goals
    label: Goals
    route: /goals
    tier_required: tier_3_recommend
    icon: target
  - circle_id: org-processes
    label: Org Processes
    route: /processes
    tier_required: tier_3_recommend
    icon: workflow
  - circle_id: cowork
    label: Cowork
    route: /cowork
    tier_required: tier_3_recommend
    icon: layers
  - circle_id: assignments
    label: Assignments
    route: /assignments
    tier_required: tier_4_costs
    icon: clipboard-check
  - circle_id: influence-cost
    label: Influence vs Cost
    route: /influence-vs-cost
    tier_required: tier_4_costs
    icon: scale
  - circle_id: calibration
    label: Calibration
    route: /calibration
    tier_required: tier_5_live
    icon: sliders
  - circle_id: founder
