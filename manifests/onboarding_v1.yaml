  # ─── LOCAL-MIND TIER CIRCLES (added v1.2.0) ──────────────────────────
  # These 4 circles render in their own concentric orbit per
  # [[platform_hub_circles_design_directive]] (inner orbit reserved for
  # tier_1_data + always; local-mind circles land in a NEW orbit dedicated
  # to operator-machine-installed capabilities — visually distinct from the
  # platform-side tier orbits).
  #
  # GATING SEMANTICS DIFFER from platform circles:
  #   platform circles: bright IFF circle_id in nav_circles_enabled[]
  #   local-mind circles: bright IFF local_mind_tier_required in
  #     local_mind_tiers_unlocked[] (NEW field on /v1/onboarding/state)
  #
  # CLICK-WHEN-DIM behavior (per directive):
  #   navigates to /chat?onboarding=stage-10-local-mind&tier=N
  #   The chat orchestrator walks the operator through install
  #   (Phase 1) / Phase 2 enable / mic authorization / capability probe
  #   per the local-mind tier they're trying to unlock. See stage-10
  #   below for the action set.
  #
  # tier_required is set to `always` so platform-tier gating does NOT
  # block these — local-mind capabilities are independent of onboarding
  # stage progression. The local_mind_tier_required field is the binding
  # gate. (The FE primitive useNavCircleGating must respect both fields
  # — additive contract, see SCHEMA NOTES at the bottom of this manifest.)
  - circle_id: local-mind-reading-eyes
    label: Reading Eyes
    route: /local-mind/reading-eyes
    tier_required: always
    local_mind_tier_required: tier_1_reading_eyes
    capability_required: [embed, dedup, redact_pii]
    parent_circle: platform
    orbit: local_mind
    icon: local-mind-tier-1  # placeholder per [[icon_generation_system_directive]]
    navigates_to_on_locked: '/chat?onboarding=stage-10-local-mind&tier=1'
    description: |
      Tier 1 — embeddings, dedup, and PII redaction run on the operator's
      own machine. Cloud embedder bypassed; intelligence-silo accepts
      pre-embedded chunks. Unlocked by installing gigaton-local-mind MCP
      server (Phase 1, EOD 2026-06-03 per directive_local_mind_buildout).
  - circle_id: local-mind-local-mind
    label: Local Mind
    route: /local-mind/local-mind
    tier_required: always
    local_mind_tier_required: tier_2_local_mind
    capability_required: [search, categorize]
    parent_circle: platform
    orbit: local_mind
    icon: local-mind-tier-2
    navigates_to_on_locked: '/chat?onboarding=stage-10-local-mind&tier=2'
    description: |
      Tier 2 — local FAISS search + classifier head. /v1/qa/ask first-pass
      hits the operator's local index; categorization runs locally and
      escalates to Vertex Haiku only when confidence < 0.7. Unlocks after
      Phase 2 (EOD 2026-06-12).
  - circle_id: local-mind-connected-tools
    label: Connected Tools
    route: /local-mind/connected-tools
    tier_required: always
    local_mind_tier_required: tier_3_connected_tools
    capability_required: [transcribe, mic_authorized]
    parent_circle: platform
    orbit: local_mind
    icon: local-mind-tier-3
    navigates_to_on_locked: '/chat?onboarding=stage-10-local-mind&tier=3'
    additional_gate: 'operator microphone authorization'
    description: |
      Tier 3 — transcription (mlx-whisper / whisper.cpp) runs locally;
      meeting audio never crosses the cloud boundary. Mic authorization
      required. Unlocks after Phase 2 + mic grant.
  - circle_id: local-mind-writing-hand
    label: Writing Hand
    route: /local-mind/writing-hand
    tier_required: always
    local_mind_tier_required: tier_4_writing_hand
    capability_required: [slm_generate, capability_probe]
    parent_circle: platform
    orbit: local_mind
    icon: local-mind-tier-4
    navigates_to_on_locked: '/chat?onboarding=stage-10-local-mind&tier=4'
    additional_gate: 'capability_probe: ram_gb >= 16 AND disk_free_gb >= 10'
    description: |
      Tier 4 — local SLM (Llama-3.2-3B Q4_K_M default) generates first-pass
      drafts on the operator's machine. /v1/qa/ask first-pass is local;
      explicit "ask the frontier" escalates to Vertex. Gated on capability
      probe. Unlocks after Phase 3 (EOD 2026-06-26).

# Deprecated routes — redirect rules the FE App.tsx enforces.
deprecated_routes:
  - from: /wizard
    to: /chat?onboarding=stage-0
    reason: 'Wizard replaced by chat-first onboarding orchestration. Stage 0 capture happens in chat.'
    deprecated_at: '2026-05-22T19:00:00Z'

# ─────────────────────────────────────────────────────────────────────────
# STAGES
# Each stage is bound to ONE owning engine. The activation_gate is a query
# that engine answers (200 OK + JSON predicate → stage advances). The
# resolver polls activation_gates; the engine owns the rule.
# ─────────────────────────────────────────────────────────────────────────

stages:

  # ─── STAGE 0 ────────────────────────────────────────────────────────────
  - id: stage-0-trust-scope
    order: 0
    name: Trust & Scope Anchor
    short_description: Declare your legal entity, jurisdictions, and the rules your operator agrees to operate under.
    why_this_stage: |
      Every artifact recorded after this point attaches to a scope contract.
      Without it, ingestion creates silent compliance debt. The Axiom
      Registry is the catalog of inviolable rules — you acknowledge which
      apply to your operator.
    owning_engine: user-access-engine
    secondary_engines: [decision-engine]
    entry_signal:
      type: always_open  # Stage 0 is always available — it's the entry point
    activation_gate:
      method: GET
      url: '{uae_base}/v1/operators/{operator_id}/scope-contract'
      predicate:
        json_path: '$.signed_at'
        operator: is_not_null
      ttl_seconds: 60
    actions:
      - id: declare-legal-entity
        title: Declare your legal entity
        description: Name, jurisdiction(s) of incorporation, and regulated frameworks (HIPAA / GDPR / FINRA / etc.).
        action_label: Open Identity step
        action_href: '/wizard?step=identity'  # adopts existing wizard
        verify_description: UAE has a non-null legal_entity_record for this operator
        auto_complete_on:
          - event_type: ScopeIdentityDeclared
      - id: select-jurisdictions
        title: Select jurisdictions you operate in
        description: Used to scope every later compliance check + data residency choice.
        action_label: Open Context step
        action_href: '/wizard?step=context'
        auto_complete_on:
          - event_type: ScopeJurisdictionsSelected
      - id: acknowledge-axioms
        title: Review the Gigaton Axiom Registry
        description: 20 inviolable rules the platform enforces. Acknowledge the ones in scope; flag any that conflict with your context.
        action_label: Open Axiom Registry
        action_href: '/onboarding/axioms'
        verify_description: decision-engine has an acknowledgement row per CRIT-severity axiom
        education_ref: '/docs/axiom-registry'
        auto_complete_on:
          - event_type: AxiomAcknowledged
            min_count_per_severity:
              CRIT: all
              MAJ: all
      - id: sign-scope-contract
        title: Sign the scope contract
        description: Cryptographic acknowledgement that the above declarations are accurate. Signed copy stored in your operator namespace.
        action_label: Sign & continue
        action_href: '/wizard?step=trust'
        auto_complete_on:
          - event_type: ScopeContractSigned
    education:
      why_1min: '/docs/why/trust-scope-1min.md'
      what_3min: '/docs/what/trust-scope-3min.md'
      deep_dive_10min: '/docs/deep/trust-scope-axiom-registry-10min.md'
    events_emitted:
      - StageStarted
      - ScopeIdentityDeclared
      - ScopeJurisdictionsSelected
      - AxiomAcknowledged
      - ScopeContractSigned
      - StageCompleted
    capability_unlocks_on_completion: tier_1_data  # first half — Stage 1 closes it
    gamification:
      badge_slug: trust-anchored
      badge_name: Trust Anchored
      streak_eligible: false
      predicted_influence_usd_endpoint:
        method: GET
        url: '{ppeme_base}/v1/stage-influence?stage_id=stage-0-trust-scope&operator_id={operator_id}'
      fallback_predicted_influence_usd: 4500
    ppim_signature:
      interaction: governance + compliance posture
      economics: prevents avg $12k compliance retrofit cost
      predictability: foundational
      brand_dimension: integrity + legitimacy

  # ─── STAGE 1 ────────────────────────────────────────────────────────────
  - id: stage-1-sources
    order: 1
    name: Sources
    short_description: Connect Google Drive accounts and let Gigaton ingest your documentation into one canonical NotebookLM-ready folder.
    why_this_stage: |
      Every later decision is grounded in your actual documentation. Without
      sources connected, the platform falls back to generic templates. With
      ≥1 source connected, "chat with your data" turns on.
    owning_engine: intelligence-silo
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-0-trust-scope
    activation_gate:
      method: GET
      url: '{intel_silo_base}/v1/documentation/bundle?operator_id={operator_id}'
      predicate:
        json_path: '$.file_count'
        operator: gte
        value: 20
      ttl_seconds: 30
    delegates_to_workflow: documentation-ingest-2026-05-20  # the existing 7-step workflow IS Stage 1's UI
    actions: []  # see delegated workflow
    education:
      why_1min: '/docs/why/sources-1min.md'
      what_3min: '/docs/what/sources-3min.md'
      deep_dive_10min: '/docs/deep/documentation-ingest-10min.md'
    events_emitted:
      - StageStarted
      - DocumentationAccountsLinked
      - DocumentationFolderSubscribed
      - DocumentationIngestRun
      - DocumentationCoverageAdvanced
      - StageCompleted
    capability_unlocks_on_completion: tier_1_data
    gamification:
      badge_slug: documentation-connector-pro
      badge_name: Documentation Connector Pro
      streak_eligible: true
      fallback_predicted_influence_usd: 8500
    ppim_signature:
      interaction: doctrine grounding for every later decision
      economics: avg $0.50/operator/mo ingest cost; unlocks chat-with-data ($1-3k/mo founder time saved)
      predictability: HIGH
      brand_dimension: knowledge_coherence + auditability

  # ─── STAGE 2 ────────────────────────────────────────────────────────────
  - id: stage-2-people
    order: 2
    name: People & Human Data
    short_description: Identify the humans and orgs you interact with — internal team, customers, vendors, regulators — and capture their behavioral profile.
    why_this_stage: |
      PPIM is "interaction management". Without people identified + a BFT
      snapshot per person, every interaction is generic. After this stage,
      personalized communication becomes available.
    owning_engine: persona-engine
    secondary_engines: [intelligence-silo, human-management-engine]
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-1-sources
    activation_gate:
      method: GET
      url: '{persona_base}/v1/operators/{operator_id}/persona-count'
      predicate:
        all_of:
          - json_path: '$.human_persona_count'
            operator: gte
            value: 3
          - json_path: '$.bft_snapshots_available_count'
            operator: gte
            value: 3
      ttl_seconds: 60
    actions:
      - id: review-proposed-people
        title: Review people proposed from your sources
        description: Gigaton scans your Stage 1 sources and proposes people. Accept, edit, or reject each.
        action_label: Review people
        action_href: '/onboarding/people?action=review-proposed'
        auto_complete_on:
          - event_type: PersonaCreated
            min_count: 3
      - id: capture-initial-intent
        title: Capture initial intent for each person
        description: One sentence per person — what is this relationship FOR? Drives BFT scoring.
        action_label: Capture intents
        action_href: '/onboarding/people?action=intents'
        auto_complete_on:
          - event_type: PersonaIntentCaptured
            min_count: 3
      - id: classify-internal-external
        title: Classify each person internal vs external
        description: Internal team / customer / vendor / regulator / prospect. Each classification routes differently.
        action_label: Classify
        action_href: '/onboarding/people?action=classify'
        auto_complete_on:
          - event_type: PersonaClassified
            min_count: 3
    education:
      why_1min: '/docs/why/people-1min.md'
      what_3min: '/docs/what/people-3min.md'
      deep_dive_10min: '/docs/deep/bft-snapshot-explainer-10min.md'
    events_emitted:
      - StageStarted
      - PersonaCreated
      - PersonaIntentCaptured
      - PersonaClassified
      - StageCompleted
    capability_unlocks_on_completion: tier_2_personalized  # first half
    gamification:
      badge_slug: relationship-mapped
      badge_name: Relationship Mapped
      streak_eligible: true
      fallback_predicted_influence_usd: 11000
    ppim_signature:
      interaction: every later comm is now person-targeted
      economics: avg $2-5k/mo communication-quality lift from personalization
      predictability: MEDIUM (depends on BFT snapshot quality)
      brand_dimension: responsiveness + relevance

  # ─── STAGE 3 ────────────────────────────────────────────────────────────
  - id: stage-3-brand-customer-lens
    order: 3
    name: Brand & Customer Lens
    short_description: Define your brand voice and Ideal Customer Profile so the platform speaks in your voice to the right audience.
    why_this_stage: |
      PPIM = "predictably profitable interaction management of a gigaton
      engineered brand experience". Without brand + ICP, Penrose has no
      target distribution to optimize against. Bound to persona-engine's
      Variable Registry (brand_voice category, 6 vars) + org_persona ICP.
    owning_engine: persona-engine
    entry_signal:
      type: prior_stage_completed
      stage_id: stage-2-people
    activation_gate:
      method: GET
      url: '{persona_base}/v1/operators/{operator_id}/brand-readiness'
      predicate:
        all_of:
          - json_path: '$.brand_voice_variables_filled'
            operator: gte
            value: 6  # all 6 brand_voice category seed vars
          - json_path: '$.icp_segments_defined'
            operator: gte
            value: 1
      ttl_seconds: 60
    actions:
      - id: fill-brand-voice-variables
        title: Fill the 6 brand voice variables
        description: tone, formality, languages, archetypes, taboos, response cadence. Pre-populated from your sources where possible.
        action_label: Fill brand voice
        action_href: '/onboarding/brand?action=voice-variables'
        variable_registry_filter:
          required_for: onboarding
          tag: brand_voice
        auto_complete_on:
          - event_type: VariableInstanceFilled
            tag: brand_voice
            min_count: 6
      - id: declare-icp-segments
        title: Declare your Ideal Customer Profile segments
        description: Write into org_persona.icp_attributes JSONB. At least 1 segment; more is better.
        action_label: Declare ICP
