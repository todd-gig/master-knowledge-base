thresholds:
  value_execute_min: 14.0
  value_escalate_min: 8.0
  trust_execute_min: 3.5
  trust_recommend_min: 2.2

value_weights:
  revenue_impact: 1.5
  cost_efficiency: 1.2
  time_leverage: 1.3
  strategic_alignment: 2.0
  customer_benefit: 1.4
  knowledge_creation: 1.1
  compounding_potential: 1.8
  reversibility: 1.0

penalty_weights:
  downside_risk: 2.0
  execution_drag: 1.2
  uncertainty: 1.5
  ethical_misalignment: 3.0

trust_multiplier:
  T0: 0.2
  T1: 0.5
  T2: 0.8
  T3: 1.0
  T4: 1.2

authority_matrix:
  D1:
    min_trust: T3
    executor: AI_Domain_Agent
    required_approval: none
  D2:
    min_trust: T3
    executor: AI_Domain_Agent
    required_approval: Domain_Owner
  D3:
    min_trust: T2
    executor: Domain_Owner
    required_approval: Human_Executive
  D4:
    min_trust: T2
    executor: Human_Executive
    required_approval: Human_CEO
  D5:
    min_trust: T1
    executor: Human_Executive
    required_approval: Human_CEO
  D6:
    min_trust: T1
    executor: Human_CEO
    required_approval: Human_CEO

valid_transitions:
  draft: [qualified, execution_cleared]
  qualified: [value_confirmed, draft]
  value_confirmed: [trust_certified, qualified]
  trust_certified: [execution_cleared, qualified]
  execution_cleared: [executed, trust_certified]
  executed: [reviewed]
  reviewed: [archived, qualified]
  archived: []
